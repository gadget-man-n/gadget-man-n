      :root {
        color-scheme: light;
        --bg: #f4f7fb;
        --surface: #ffffff;
        --ink: #111827;
        --muted: #65748b;
        --line: #dbe4f0;
        --blue: #1368e8;
        --blue-dark: #14356e;
        --cyan: #20a8ff;
        --green: #18a77b;
        --yellow: #f5b82e;
        --shadow: 0 18px 50px rgba(19, 50, 100, 0.16);

      * {

      }

      body {
        margin: 0;
        min-height: 100vh;
        color: var(--ink);
        background:

        letter-spacing: 0;
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      button {
        font: inherit;
      }

      .page {
        width: min(100%, 760px);
        margin: 0 auto;
        padding: 20px 16px 44px;
      }

      .profile {
        position: relative;
        overflow: hidden;
        min-height: 230px;
        border-radius: 0 0 28px 28px;
        margin: -20px -16px 0;
        padding: 26px 18px 20px;
        color: #fff;

      }

      .profile::after {
        content: "";
        position: absolute;
        inset: auto -70px -150px 34%;
        height: 230px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.16);
      }

      .profile-inner {
        position: relative;
        z-index: 1;
        display: grid;
        grid-template-columns: 104px 1fr;
        gap: 16px;
        align-items: center;
      }

      .avatar {
        width: 104px;
        aspect-ratio: 1;
        border: 4px solid rgba(255, 255, 255, 0.92);
        border-radius: 24px;
        object-fit: cover;
        box-shadow: 0 16px 34px rgba(6, 21, 57, 0.28);
      }

      h1 {
        margin: 12px 0 8px;
        font-size: clamp(20px, 5.4vw, 40px);
        line-height: 1;
        letter-spacing: 0;
        white-space: nowrap;
      }

      .lead {
        margin: 0;
        color: rgba(255, 255, 255, 0.88);
        font-size: 14px;
        line-height: 1.8;
      }

        z-index: 1;

        min-height: 48px;
        margin-top: 18px;
        padding: 10px 13px;
        border: 1px solid rgba(255, 255, 255, 0.72);
        border-radius: 8px;
        background: #ffffff;
        color: var(--blue-dark);
        backdrop-filter: blur(10px);
        box-shadow: 0 14px 30px rgba(6, 21, 57, 0.18);
      }

      .work-link span {
        color: var(--blue);
        font-size: 12px;
        font-weight: 800;
        line-height: 1.2;
      }

      .work-link strong {
        color: #0c214d;
        overflow-wrap: anywhere;
        font-size: 13px;
        line-height: 1.35;
      }

      .social-links {
        position: relative;
        z-index: 1;
        display: flex;
        gap: 10px;
        align-items: center;
        margin-top: 12px;
      }

      .social-link {
        display: grid;
        width: 42px;
        height: 42px;
        place-items: center;
        border: 1px solid rgba(255, 255, 255, 0.38);
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.18);
        color: #fff;
        box-shadow: 0 10px 24px rgba(6, 21, 57, 0.12);
        transition:
          transform 0.18s ease,
          background 0.18s ease;
      }

        transform: translateY(-1px);
        background: rgba(255, 255, 255, 0.28);
      }

      .social-link svg {
        width: 20px;
        height: 20px;
        fill: currentColor;
      }

        padding: 13px 14px;

        border-radius: 8px;
        background: #eef6ff;
        color: #244267;
        font-size: 12px;
        line-height: 1.65;
      }

      .notice-mark {

        flex: 0 0 24px;
        width: 24px;
        height: 24px;
        place-items: center;
        border-radius: 999px;
        background: var(--blue);
        color: #fff;
        font-size: 13px;
        font-weight: 900;

        margin: 0 -16px;

        gap: 8px;
        min-height: 48px;
        padding: 0 14px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--surface);

        height: 20px;

        border: 0;
        outline: 0;
        color: var(--ink);
        background: transparent;
        font-size: 15px;

      .tabs {

        gap: 8px;
        overflow-x: auto;
        margin: 12px -16px 0;
        padding: 0 16px 4px;
        scrollbar-width: none;
      }

      .tabs::-webkit-scrollbar {

      }

        flex: 0 0 auto;
        align-items: center;
        justify-content: center;
        min-height: 40px;
        padding: 0 14px;
        border: 1px solid var(--line);

        background: #fff;

        font-weight: 800;

      .tab:hover {
        transform: translateY(-1px);
      }

      const categoryLabels = Object.fromEntries(categories.map((category) => [category.id, category.label]));
      const categoryTitles = {
        coupon: "🉐おトクなクーポン発行中",
        crowdfunding: "クラウドファンディング実施中",
        iphone: "iPhone関連",
        ipad: "iPad関連",
        applewatch: "Apple Watch関連",
        mac: "Mac･PC関連",
        powerbank: "モバイルバッテリー",
        earphone: "イヤホン",
        all: "すべてのアイテム",
      };
      const tabs = document.querySelector("#tabs");
      const grid = document.querySelector("#itemGrid");
      const input = document.querySelector("#searchInput");
      const itemCount = document.querySelector("#itemCount");
      const emptyState = document.querySelector("#emptyState");
      const title = document.querySelector("#itemsTitle");
      let activeCategory = "recent";

      function renderTabs() {
        tabs.innerHTML = categories
          .map(
            (category) => `
              <button
                class="tab"
                type="button"
                role="tab"
                aria-selected="${category.id === activeCategory}"
                data-category="${category.id}"
              >${category.label}</button>
            `,
          )
          .join("");
      }

      function getFilteredItems() {
        const keyword = input.value.trim().toLowerCase();
        return items.filter((item) => {
          const categoryMatch =
            activeCategory === "all" ||
            (activeCategory === "recent" && item.recent) ||
            item.categories?.includes(activeCategory) ||
            (activeCategory === "coupon" && item.couponActive);
          const text =
            `${item.name} ${item.desc} ${item.coupon || ""} ${item.note || ""} ${item.badge} ${categoryLabels[item.category]} ${(item.categories || []).map((category) => categoryLabels[category] || category).join(" ")}`.toLowerCase();
          return categoryMatch && (!keyword || text.includes(keyword));
        });
      }

      function getThumbnailSrc(item) {
        if (item.thumbnail) return item.thumbnail;
        if (!item.url || item.url === "#") return "";
        return `https://api.microlink.io/?url=${encodeURIComponent(item.url)}&screenshot=true&embed=screenshot.url`;
      }

      function renderItems() {
        const filteredItems = getFilteredItems();
        title.textContent =
          activeCategory === "recent"
            ? "直近紹介アイテム"
            : categoryTitles[activeCategory] || `${categoryLabels[activeCategory]}アイテム`;
        itemCount.textContent = `${filteredItems.length}件`;
        emptyState.style.display = filteredItems.length ? "none" : "block";
        grid.innerHTML = filteredItems
          .map(
            (item) => {
              const thumbnail = getThumbnailSrc(item);
              const categoryBadges = (item.categories || [item.category])
                .map((category) => categoryLabels[category] || category)
                .filter((label, index, labels) => label !== item.badge && labels.indexOf(label) === index)
                .map((label) => `<span class="badge">${label}</span>`)
                .join("");
              return `
              <article class="card">
                <div class="thumb" aria-hidden="true">
                  ${
                    thumbnail
                      ? `<img src="${thumbnail}" alt="" loading="lazy" onerror="this.replaceWith(document.createTextNode('${item.icon}'))">`
                      : item.icon
                  }
                </div>
                <div class="item-main">
                  <div class="item-top">
                    <span class="badge ${item.badgeType || ""}">${item.badge}</span>
                    ${categoryBadges}
                  </div>
                  <h3 class="item-name">${item.name}</h3>
                  <p class="item-desc">${item.desc}</p>
                  ${item.coupon ? `<p class="coupon-note">${item.coupon}</p>` : ""}
                  ${item.note ? `<p class="coupon-note">${item.note}</p>` : ""}
                  <div class="item-actions">
                    <a class="buy" href="${item.url}" target="_blank" rel="noopener">商品をチェック</a>
                  </div>
                </div>
              </article>
            `;
            },
          )
          .join("");
      }

      tabs.addEventListener("click", (event) => {
        const button = event.target.closest("button[data-category]");
        if (!button) return;
        activeCategory = button.dataset.category;
        renderTabs();
        renderItems();
      });

      input.addEventListener("input", () => {
        if (input.value.trim() && activeCategory !== "all") {
          activeCategory = "all";
          renderTabs();
        }
        renderItems();
      });

      renderTabs();
      renderItems();
    </script>
